# 蓝牙信号强度相关
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 配对蓝牙设备的最大数量最多5个
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

# 是否开启蓝牙链接密码
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# 是否启用休眠
CONFIG_ZMK_SLEEP=y

# 进入空闲状态前的不活动毫秒数
CONFIG_ZMK_IDLE_TIMEOUT=300000
# 1800000 毫秒 = 30 分钟 * 60 秒 * 1000

# 增加键盘消抖
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# 同时开启USB和BLE
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# 32kHz晶振启用开关
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y

# 编码器开关
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB电源控制开关
CONFIG_ZMK_EXT_POWER=y

#启用RGB背光及灯效
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=90

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=20
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# ========== 20250416更新 ==========
CONFIG_BT=y
CONFIG_ZMK_BLE=y
# ========== 新增：ESB 2.4G 三模核心配置 ==========
CONFIG_ZMK_RADIO_ESB=y  # 启用ESB 2.4G
CONFIG_ZMK_TRANSPORT_SELECTION=y  # 允许三模切换
CONFIG_ZMK_TRANSPORT_AUTO_FALLBACK=y  # 自动 fallback 到可用模式

# ESB 低功耗参数（和之前最优功耗一致）
CONFIG_ZMK_RADIO_ESB_CHANNEL=60  # 2.4G信道，避开BLE常用
CONFIG_ZMK_RADIO_ESB_ADDR_AUTO_INC=y
CONFIG_ZMK_RADIO_ESB_RETRY_DELAY=500
CONFIG_ZMK_RADIO_ESB_IDLE_INTERVAL=500  # 空闲间隔，省电

# 电源/休眠（必须保留，保证低功耗）
CONFIG_SYS_POWER_MANAGEMENT=y
CONFIG_SYS_POWER_DEEP_SLEEP_STATES=y
CONFIG_NRF_SYSTEM_OFF_WAKEUP_GPIO=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y  # 必须外部32768晶振

# 关闭无用外设（省电）
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_ADC=n
CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_LOG=n

CONFIG_ZMK_RADIO_ESB=y
CONFIG_ZMK_TRANSPORT_SELECTION=y
